<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmos e Programação - Unipampa - Fernando Dala</title>
    <style>
        :root {
            --azul-profundo:    #071028;
            --azul-escuro:      #0D2550;
            --azul-medio:       #1A4A8A;
            --azul-royal:       #1565C0;
            --azul-vivo:        #1E88E5;
            --azul-claro:       #64B5F6;
            --branco:           #ffffff;
            --texto-claro:      #E8F4FD;
            --texto-secundario: #90CAF9;
            --glass-fundo:      rgba(255,255,255,0.06);
            --glass-fundo-hov:  rgba(255,255,255,0.11);
            --glass-border:     rgba(100,181,246,0.20);
            --glass-border-hov: rgba(100,181,246,0.50);
            --glass-blur:       blur(14px);
        }
        * { margin:0; padding:0; box-sizing:border-box;
            font-family:'SF Pro Display',system-ui,-apple-system,sans-serif; }
        body {
            background: linear-gradient(160deg, #0D1B3E 0%, #0A2D6E 35%, #0D1F4E 65%, #071028 100%);
            background-attachment: fixed;
            color: var(--texto-claro);
            padding: 40px 20px;
            line-height: 1.6;
            min-height: 100vh;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:
                radial-gradient(circle at 20% 25%, rgba(30,136,229,.13) 0%, transparent 50%),
                radial-gradient(circle at 80% 75%, rgba(13,37,80,.28) 0%, transparent 50%);
        }
        .container { max-width:1250px; margin:auto; position:relative; z-index:1; }
        header {
            text-align:center; margin-bottom:40px;
            background: var(--glass-fundo);
            padding: 50px 30px 42px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 8px 48px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);
            position:relative; overflow:hidden;
        }
        header::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, transparent 0%, var(--azul-claro) 35%, #fff 55%, var(--azul-claro) 75%, transparent 100%);
        }
        .logo-unipampa { margin-bottom:30px; display:flex; justify-content:center; }
        .logo-wrapper {
            background: rgba(255,255,255,0.97);
            border-radius: 18px; padding: 20px 36px;
            display: inline-flex; align-items: center; justify-content:center;
            box-shadow: 0 6px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(100,181,246,.35);
        }
        .logo-wrapper svg { width:300px; height:auto; max-width:100%; display:block; }
        h1 { color: var(--branco); margin-bottom:6px; font-size:2.4rem; font-weight:800; letter-spacing:-0.5px; text-shadow: 0 2px 24px rgba(30,136,229,.45); }
        .disciplina { font-size:1.1rem; color:var(--azul-claro); font-weight:600; margin-bottom:22px; letter-spacing:1px; text-transform:uppercase; }
        .info-aluno {
            display:inline-flex; flex-wrap:wrap; justify-content:center; gap:24px;
            background:rgba(255,255,255,.05); padding:12px 32px; border-radius:40px;
            border:1px solid rgba(100,181,246,.18); margin-bottom:35px; font-size:.95rem;
        }
        .info-aluno span  { color:var(--texto-secundario); }
        .info-aluno strong{ color:var(--branco); font-weight:700; }
        .dashboard-controls { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; }
        .btn-filtro {
            background:rgba(255,255,255,.06); border:1px solid rgba(100,181,246,.25);
            padding:10px 22px; border-radius:30px; font-size:.9rem; font-weight:700;
            cursor:pointer; color:var(--azul-claro);
            display:flex; align-items:center; gap:10px; transition:all .3s ease;
        }
        .btn-filtro:hover { background:rgba(100,181,246,.12); border-color:rgba(100,181,246,.5); transform:translateY(-2px); }
        .btn-filtro.ativo {
            background:linear-gradient(135deg, var(--azul-royal) 0%, var(--azul-vivo) 100%);
            color:var(--branco); border-color:transparent;
            box-shadow:0 4px 20px rgba(30,136,229,.45);
        }
        .badge-count { background:rgba(255,255,255,.12); padding:2px 10px; border-radius:12px; font-size:.8rem; }
        .btn-filtro.ativo .badge-count { background:rgba(255,255,255,.22); }
        .tarefas { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:22px; }
        .tarefa {
            background:var(--glass-fundo); padding:30px; border-radius:20px;
            border:1px solid var(--glass-border); backdrop-filter:var(--glass-blur);
            -webkit-backdrop-filter:var(--glass-blur);
            display:flex; flex-direction:column; justify-content:space-between;
            transition:all .35s cubic-bezier(.4,0,.2,1);
            box-shadow:0 4px 24px rgba(0,0,0,.3);
            position:relative; overflow:hidden;
        }
        .tarefa::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:4px;
            background:linear-gradient(90deg, var(--azul-medio) 0%, var(--azul-claro) 60%, rgba(255,255,255,.55) 100%);
            opacity:.5; transition:opacity .35s ease;
        }
        .tarefa:hover { transform:translateY(-5px); background:var(--glass-fundo-hov); border-color:var(--glass-border-hov); box-shadow:0 14px 44px rgba(0,0,0,.45), 0 0 0 1px rgba(100,181,246,.22); }
        .tarefa:hover::before { opacity:1; }
        .tarefa-conteudo h2 { font-size:1.18rem; margin-bottom:10px; color:var(--branco); font-weight:700; }
        .tarefa-conteudo p  { font-size:.92rem; color:var(--texto-secundario); line-height:1.6; margin-bottom:18px; }
        .tarefa-links { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
        .btn-link-tarefa {
            display:inline-flex; align-items:center; gap:6px; padding:8px 15px;
            background:rgba(30,136,229,.12); color:var(--azul-claro);
            border:1px solid rgba(100,181,246,.3); border-radius:10px;
            font-size:.83rem; font-weight:700; text-decoration:none; white-space:nowrap;
            transition:all .25s ease;
        }
        .btn-link-tarefa:hover { background:var(--azul-vivo); color:var(--branco); border-color:var(--azul-vivo); box-shadow:0 4px 16px rgba(30,136,229,.45); }
        .btn-link-tarefa.desabilitado { opacity:.3; pointer-events:none; }
        .status-tag {
            align-self:flex-start; padding:6px 16px; border-radius:30px;
            font-size:.75rem; font-weight:700; color:var(--branco);
            text-transform:uppercase; letter-spacing:1px;
            background:linear-gradient(135deg, var(--azul-medio) 0%, var(--azul-vivo) 100%);
            box-shadow:0 2px 12px rgba(30,136,229,.35);
        }
        .status-tag.pendente { background:linear-gradient(135deg,#37474F 0%,#546E7A 100%); box-shadow:none; }
        footer { text-align:center; margin-top:70px; color:rgba(144,202,249,.55); font-size:.9rem; border-top:1px solid rgba(100,181,246,.12); padding-top:25px; }
        footer strong { color:var(--azul-claro); }
        @media (max-width:768px){
            h1 { font-size:1.75rem; } body { padding:20px 12px; }
            header { padding:32px 16px 26px; } .logo-wrapper { padding:14px 22px; } .logo-wrapper svg { width:220px; }
            .info-aluno { flex-direction:column; gap:6px; padding:14px; width:100%; border-radius:16px; }
            .dashboard-controls { flex-direction:column; width:100%; }
            .btn-filtro { width:100%; justify-content:space-between; }
            .tarefas { grid-template-columns:1fr; gap:14px; } .tarefa { padding:22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo-unipampa">
            <div class="logo-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
                    <g fill="#38A832">
                        <circle cx="173" cy="20" r="16.5"/>
                        <circle cx="200" cy="13" r="16.5"/>
                        <circle cx="227" cy="20" r="16.5"/>
                        <rect x="196" y="30" width="8" height="14" rx="3"/>
                    </g>
                    <text x="200" y="82" text-anchor="middle"
                        font-family="'Arial Black','Franklin Gothic Heavy','Impact',sans-serif"
                        font-weight="900" font-size="46" fill="#1A1A1A" letter-spacing="-1.5">unipampa</text>
                    <path d="M 22 92 Q 100 83 200 90 Q 300 97 378 88"
                        stroke="#38A832" stroke-width="3.2" fill="none" stroke-linecap="round"/>
                    <text x="200" y="114" text-anchor="middle"
                        font-family="'Arial','Helvetica Neue',sans-serif"
                        font-weight="700" font-size="13.5" fill="#1A1A1A" letter-spacing="0.2">Universidade Federal do Pampa</text>
                </svg>
            </div>
        </div>
        <h1>Algoritmos e Programação</h1>
        <p class="disciplina">Portfólio de Entregas Digitais</p>
        <div class="info-aluno">
            <span><strong>Aluno:</strong> Fernando Da Silva Dala</span>
            <span><strong>Matrícula:</strong> 2610100511</span>
        </div>
        <div class="dashboard-controls">
            <button class="btn-filtro ativo" onclick="filtrarTarefas('todas',this)">Todas <span class="badge-count" id="count-todas">0</span></button>
            <button class="btn-filtro" onclick="filtrarTarefas('concluida',this)">Concluídas <span class="badge-count" id="count-concluida">0</span></button>
            <button class="btn-filtro" onclick="filtrarTarefas('pendente',this)">Pendentes <span class="badge-count" id="count-pendente">0</span></button>
        </div>
    </header>
    <section class="tarefas" id="grid-tarefas"></section>
    <footer>
        <p><strong>Universidade Federal do Pampa &bull; Campus Alegrete</strong> &bull; Engenharia &copy; 2026</p>
    </footer>
</div>
<script>
var TAREFAS = [
    { numero:"01", titulo:"Seleção de Problemas", descricao:"Análise e seleção de 15 exercícios de lógica aplicada.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-01/", icon:"📁" }] },
    { numero:"02", titulo:"Base Algorítmica", descricao:"Lista de 10 exercícios fundamentais da INTRODUÇÃO A ALGORITMOS.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-02/", icon:"📁" }] },
    { numero:"03", titulo:"Formulação de Exercícios", descricao:"Formulação completa de uma lista estruturada com 10 novos exercícios.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-03/", icon:"📁" }] },
    { numero:"04", titulo:"Resolução Analítica", descricao:"Resolução de 5 exercícios analíticos diretamente no papel.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-04/", icon:"📁" }] },
    { numero:"05", titulo:"Estruturas em Python", descricao:"Implementação nativa de listas/vetores/arrays em Python.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-05/", icon:"📁" }] },
    { numero:"06", titulo:"Domínio de Vetores", descricao:"Formulação e Resolução avançada de problemas complexos com Vetores.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-06/", icon:"📁" }] },
    { numero:"07", titulo:"Refatoração Visual", descricao:"Desenvolvimento iterativo até obter resultados visuais consistentes.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-07/", icon:"📁" }] },
    { numero:"08", titulo:"Interdisciplinaridade", descricao:"Resolução analítica de problemas vindos de outras disciplinas.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-08/", icon:"📁" }] },
    { numero:"09", titulo:"Desafio de Engenharia I", descricao:"Análise e entrega do primeiro problema de engenharia complexo proposto.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-09/", icon:"📁" }] },
    { numero:"10", titulo:"Desafio de Engenharia II", descricao:"Análise e entrega do segundo problema de engenharia complexo proposto.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-10/", icon:"📁" }] },
    { numero:"11", titulo:"Aplicação Prática", descricao:"Escolher e resolver um problema de modelagem voltado à engenharia.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-11/", icon:"📁" }] },
    { numero:"12", titulo:"Otimização", descricao:"Evolução técnica e refatoração arquitetural da solução anterior.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-12/", icon:"📁" }] },
    { numero:"13", titulo:"UX e Entrevistas", descricao:"Briefing sincero e reflexivo sobre as entrevistas de UX realizadas.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-13/", icon:"📁" }] },
    { numero:"14", titulo:"Modularização & LLMs", descricao:"Modularização de Código e Avaliação crítica de Large Language Models.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-14/", icon:"📁" }] },
    { numero:"15", titulo:"Auditoria Web: alegrete.org", descricao:"Auditoria crítica de usabilidade e SEO do site alegrete.org.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-15/", icon:"📁" }] },
    { numero:"16", titulo:"Engenharia Assistida por IA", descricao:"Desenvolvimento para Alegrete.org com suporte de ferramentas de IA.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-16/", icon:"📁" }] },
    { numero:"17", titulo:"Homologação de Produção", descricao:"Publicação do link oficial e print do ambiente implantado em produção.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-17/", icon:"📁" }] },
    { numero:"18", titulo:"Portfólio Final (V1)", descricao:"Consolidação do Projeto Final da Disciplina estruturado no GitHub.", status:"concluida", links:[{ label:"Pasta da Tarefa", url:"tarefa-18/", icon:"📁" }] }
];
function isExterno(url){ return url && (url.indexOf('http')===0 || url.indexOf('.pdf')!==-1); }
function renderizarTarefas(){
    var grid=document.getElementById('grid-tarefas'); grid.innerHTML='';
    for(var i=0;i<TAREFAS.length;i++){
        var t=TAREFAS[i], linksHTML='';
        for(var j=0;j<t.links.length;j++){
            var l=t.links[j];
            var dis=(!l.url)?' desabilitado':'';
            var href=l.url?'href="'+l.url+'"':'';
            var tgt=isExterno(l.url)?'target="_blank" rel="noopener noreferrer"':'';
            linksHTML+='<a '+href+' '+tgt+' class="btn-link-tarefa'+dis+'"><span aria-hidden="true">'+l.icon+'</span>'+l.label+'</a>';
        }
        var statusLabel=t.status==='concluida'?'Concluída':'Pendente';
        var statusCls=t.status==='pendente'?' pendente':'';
        var card=document.createElement('div');
        card.className='tarefa status-'+t.status;
        card.innerHTML='<div class="tarefa-conteudo"><h2>Tarefa '+t.numero+' \u2014 '+t.titulo+'</h2><p>'+t.descricao+'</p><div class="tarefa-links">'+linksHTML+'</div></div><span class="status-tag'+statusCls+'">'+statusLabel+'</span>';
        grid.appendChild(card);
    }
    atualizarContadores();
}
function filtrarTarefas(status,botao){
    var btns=document.querySelectorAll('.btn-filtro');
    for(var i=0;i<btns.length;i++) btns[i].classList.remove('ativo');
    botao.classList.add('ativo');
    var cards=document.querySelectorAll('.tarefa');
    for(var i=0;i<cards.length;i++){
        cards[i].style.display=(status==='todas'||cards[i].classList.contains('status-'+status))?'flex':'none';
    }
}
function atualizarContadores(){
    var c=0,p=0;
    for(var i=0;i<TAREFAS.length;i++){ if(TAREFAS[i].status==='concluida') c++; else p++; }
    document.getElementById('count-todas').innerText=TAREFAS.length;
    document.getElementById('count-concluida').innerText=c;
    document.getElementById('count-pendente').innerText=p;
}
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',renderizarTarefas); } else { renderizarTarefas(); }
</script>
</body>
</html>
