<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmos e Programação - Unipampa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* SETUP DE CORES - Paleta Uxintace + Toques Acadêmicos */
        :root {
            --cor-verde: #008751;
            --cor-azul-celeste: #00a4e4;
            --cor-laranja: #f26522;
            --cor-branco: #ffffff;
            --cor-fundo: #f0f4f8;
            --cor-texto-principal: #1e293b;
            --cor-texto-secundario: #475569;
            
            /* Tons Roxos Uxintace para Componentes de Destaque */
            --ux-dark: #49225B;
            --ux-brand: #6E3482;
            --ux-mid: #A56ABD;
            --ux-light: #E7DBEF;
            --ux-soft: #F5EBFA;
            
            --status-pendente: #757575;
            --bg-gradient: linear-gradient(180deg, var(--cor-branco) 0%, var(--ux-soft) 50%, var(--ux-light) 100%);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--cor-texto-principal);
            font-family: 'Source Sans 3', sans-serif;
            padding: 50px 20px;
            min-height: 100vh;
        }

        .dashboard { 
            max-width: 1200px; 
            margin: auto; 
        }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(73, 34, 91, 0.06);
            border: 1px solid var(--cor-branco);
            margin-bottom: 40px;
        }

        .unipampa-logo { 
            margin-bottom: 25px; 
            display: inline-block; 
        }
        
        .unipampa-logo svg { 
            width: 260px; 
            height: auto; 
        }

        h1 {
            font-weight: 800;
            font-size: 2.6rem;
            color: var(--ux-dark);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-weight: 600;
            color: var(--ux-brand);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .exec-card {
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            background: var(--ux-dark);
            color: var(--cor-branco);
            padding: 15px 35px;
            border-radius: 50px;
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(73, 34, 91, 0.2);
        }

        .exec-card span strong { 
            color: var(--cor-azul-celeste); 
            margin-right: 8px; 
        }

        .filter-shelf {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: var(--cor-branco);
            border: 1px solid var(--ux-light);
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            color: var(--ux-brand);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-btn:hover { 
            background: var(--ux-soft); 
            transform: translateY(-2px); 
        }

        .filter-btn.active {
            background: var(--ux-brand);
            color: var(--cor-branco);
            border-color: var(--ux-brand);
            box-shadow: 0 5px 15px rgba(110, 52, 130, 0.25);
        }

        .count-tag {
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .filter-btn.active .count-tag { 
            background: rgba(255, 255, 255, 0.2); 
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .task-tile {
            background: var(--cor-branco);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--ux-light);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .task-tile::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--ux-mid);
            transition: 0.3s;
        }

        .task-tile:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(73, 34, 91, 0.08);
            border-color: var(--cor-azul-celeste);
        }

        .task-tile:hover::after { 
            background: var(--cor-azul-celeste); 
            width: 6px; 
        }

        .task-header h3 {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--ux-dark);
            margin-bottom: 12px;
        }

        .task-header p {
            color: var(--cor-texto-secundario);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .action-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: 2px solid var(--ux-brand);
            border-radius: 10px;
            color: var(--ux-brand);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s ease;
            text-align: center;
        }

        .action-link:hover:not(.disabled) {
            background: var(--ux-brand);
            color: var(--cor-branco);
        }

        .action-link.disabled {
            border-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            background: #f8fafc;
        }

        .status-pill {
            align-self: flex-start;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pill.concluida { 
            background: var(--ux-light); 
            color: var(--ux-dark); 
        }
        
        .status-pill.pendente { 
            background: #e2e8f0; 
            color: var(--status-pendente); 
        }

        footer {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid var(--ux-light);
            text-align: center;
            color: var(--ux-brand);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .exec-card { flex-direction: column; border-radius: 20px; gap: 10px; width: 100%; text-align: left; }
            h1 { font-size: 2rem; }
            .filter-shelf { flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>

                    <path d="M250 20l25 100h-20l-5-25h-20l-5 25h-20l25-100zm10 55l-5-25-5 25h10z"/>

                <text x="310" y="85" font-family="'Source Sans 3', sans-serif" font-weight="800" font-size="65" fill="#49225B">UNIPAMPA</text>
                <rect x="40" y="0" width="420" height="8" fill="#A56ABD" rx="4"/>
                <rect x="40" y="112" width="420" height="4" fill="#0db8d3" rx="2"/>

        <h1>Algoritmos e Programação</h1>
        <p class="subtitle">Portfólio de Engenharia de Software</p>
        
        <div class="exec-card">
            <span><strong>NOME:</strong> Fernando Da Silva Dala</span>

        </div>
        
        <div class="filter-shelf">
            <button class="filter-btn active" onclick="filtrarTarefas('todas', this)">
                TUDO <span class="count-tag" id="count-todas">0</span>
            </button>
            <button class="filter-btn" onclick="filtrarTarefas('concluida', this)">
                ENTREGUES <span class="count-tag" id="count-concluida">0</span>
            </button>
            <button class="filter-btn" onclick="filtrarTarefas('pendente', this)">

        </div>
    </header>

    <section class="grid" id="grid-tarefas"></section>

    <footer>
        <p><strong>Universidade Federal do Pampa &bull; Campus Alegrete</strong> &bull; Engenharia &copy; 2026</p>
    </footer>
</div>

        {

            titulo: "Portfólio Final (V1)",
            descricao: "Consolidação do Projeto Final da Disciplina estruturado no GitHub.",
            status: "concluida",
            links: [{ label: "Pasta da Tarefa", url: "tarefa 18/", icon: "📁", tipo: "pasta" }]
        }
    ];

    function renderizarGrid() {
        const grid = document.getElementById('grid-tarefas');
        grid.innerHTML = "";

        DADOS_TAREFAS.forEach(tarefa => {
            const tile = document.createElement('div');
            tile.className = `task-tile status-${tarefa.status}`;
            
            let htmlLinks = `<div class="links-container">`;
            tarefa.links.forEach(link => {
                if(link.url === "") {
                    htmlLinks += `<a class="action-link disabled" href="javascript:void(0)">${link.icon} ${link.label} (Em breve)</a>`;
                } else {
                    const target = (link.tipo === 'pasta') ? '_self' : '_blank';
                    htmlLinks += `<a class="action-link" href="${link.url}" target="${target}">${link.icon} ${link.label}</a>`;
                }
            });
            htmlLinks += `</div>`;

            const labelStatus = tarefa.status === 'concluida' ? 'Concluída' : 'Pendente';

            tile.innerHTML = `
                <div class="task-header">
                    <h3>${tarefa.id}. ${tarefa.titulo}</h3>
                    <p>${tarefa.descricao}</p>
                    ${htmlLinks}
                </div>
                <div class="status-pill ${tarefa.status}">${labelStatus}</div>
            `;
            grid.appendChild(tile);
        });
    }

    function filtrarTarefas(status, botao) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        botao.classList.add('active');
        
        const tiles = document.querySelectorAll('.task-tile');
        tiles.forEach(tile => {
            if (status === 'todas') {
                tile.style.display = 'flex';
            } else {
                tile.style.display = tile.classList.contains('status-' + status) ? 'flex' : 'none';
            }
        });
    }

    function atualizarContadores() {
        const total = DADOS_TAREFAS.length;
        const concluidas = DADOS_TAREFAS.filter(t => t.status === 'concluida').length;
        const pendentes = DADOS_TAREFAS.filter(t => t.status === 'pendente').length;

        document.getElementById('count-todas').innerText = total;
        document.getElementById('count-concluida').innerText = concluidas;
        document.getElementById('count-pendente').innerText = pendentes;
    }

    window.onload = function() {
        renderizarGrid();
        atualizarContadores();
    };
</script>
</body>
</html>
