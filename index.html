<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Portfolio - Fernando Dala - Unipampa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* 1. SETUP DE CORES (Paleta Uxintace) */
        :root {
            --primary-dark: #49225B;    /* Roxo Profundo */
            --primary-brand: #6E3482;   /* Roxo Institucional */
            --accent-purple: #A56ABD;   /* Roxo Médio */
            --arctic-glow: #0db8d3;     /* Ciano Arctic */
            --soft-lavender: #E7DBEF;   /* Fundo suave */
            --off-white: #F5EBFA;       
            --pure-white: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #555555;
            --status-pendente: #757575; /* Cinza para pendentes */
            
            --bg-gradient: linear-gradient(180deg, #FFFFFF 0%, #F5EBFA 50%, #E7DBEF 100%);
        }

        /* 2. CORE LAYOUT */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Source Sans 3', sans-serif;
            padding: 50px 20px;
            min-height: 100vh;
        }

        .dashboard { max-width: 1200px; margin: auto; }

        /* 3. HEADER & LOGO */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(73, 34, 91, 0.08);
            border: 1px solid var(--pure-white);
            margin-bottom: 40px;
        }

        .unipampa-logo { margin-bottom: 25px; display: inline-block; }
        .unipampa-logo svg { width: 260px; height: auto; }

        h1 {
            font-weight: 800;
            font-size: 2.8rem;
            color: var(--primary-dark);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-weight: 600;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* 4. STUDENT INFO CARD */
        .exec-card {
            display: inline-flex;
            gap: 40px;
            background: var(--primary-dark);
            color: var(--pure-white);
            padding: 15px 35px;
            border-radius: 50px;
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(73, 34, 91, 0.3);
        }

        .exec-card span strong { color: var(--arctic-glow); margin-right: 8px; }

        /* 5. CONTROLES DE FILTRO */
        .filter-shelf {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: var(--pure-white);
            border: 1px solid var(--soft-lavender);
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            color: var(--primary-brand);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-btn:hover { background: var(--off-white); transform: translateY(-2px); }

        .filter-btn.active {
            background: var(--primary-brand);
            color: var(--pure-white);
            border-color: var(--primary-brand);
            box-shadow: 0 5px 15px rgba(110, 52, 130, 0.3);
        }

        .count-tag {
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .filter-btn.active .count-tag { background: rgba(255, 255, 255, 0.2); }

        /* 6. GRID DE TAREFAS DINÂMICO */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .task-tile {
            background: var(--pure-white);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--soft-lavender);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .task-tile::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-purple);
            transition: 0.3s;
        }

        .task-tile:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(73, 34, 91, 0.1);
            border-color: var(--arctic-glow);
        }

        .task-tile:hover::after { background: var(--arctic-glow); width: 8px; }

        .task-header h3 {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .task-header p {
            color: var(--text-sub);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* CONTAINER MULTILINKS */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .action-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: 2px solid var(--primary-brand);
            border-radius: 10px;
            color: var(--primary-brand);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            text-align: center;
        }

        .action-link:hover:not(.disabled) {
            background: var(--primary-brand);
            color: var(--pure-white);
        }

        .action-link.disabled {
            border-color: #e0e0e0;
            color: #a0a0a0;
            cursor: not-allowed;
            background: #fafafa;
        }

        .status-pill {
            align-self: flex-start;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pill.concluida { background: var(--soft-lavender); color: var(--primary-dark); }
        .status-pill.pendente { background: #e0e0e0; color: var(--status-pendente); }

        /* 7. FOOTER */
        footer {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid var(--soft-lavender);
            text-align: center;
            color: var(--primary-brand);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .exec-card { flex-direction: column; border-radius: 20px; gap: 10px; width: 100%; text-align: left; }
            h1 { font-size: 2rem; }
            .filter-shelf { flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    // FUNÇÃO PARA RENDERIZAR OS TILES EM TELA
    function renderizarGrid() {
        const grid = document.getElementById('grid-tarefas');
        grid.innerHTML = "";

        DADOS_TAREFAS.forEach(tarefa => {
            const tile = document.createElement('div');
            tile.className = `task-tile status-${tarefa.status}`;
            
            // Renderização da Coleção de Links
            let htmlLinks = `<div class="links-container">`;
            tarefa.links.forEach(link => {
                if(link.url === "") {
                    htmlLinks += `<a class="action-link disabled" href="javascript:void(0)">${link.icon} ${link.label} (Breve)</a>`;
                } else {
                    const target = (link.tipo === 'pasta') ? '_self' : '_blank';
                    htmlLinks += `<a class="action-link" href="${link.url}" target="${target}">${link.icon} ${link.label}</a>`;
                }
            });
            htmlLinks += `</div>`;

            // Rótulo amigável do status
            const labelStatus = tarefa.status === 'concluida' ? 'Concluída' : 'Pendente';

            tile.innerHTML = `
                <div class="task-header">
                    <h3>${tarefa.id}. ${tarefa.titulo}</h3>
                    <p>${tarefa.descricao}</p>
                    ${htmlLinks}
                </div>
                <div class="status-pill ${tarefa.status}">${labelStatus}</div>
            `;
            grid.appendChild(tile);
        });
    }

    // FUNÇÃO FILTRAR
    function filtrarTarefas(status, botao) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        botao.classList.add('active');
        
        const tiles = document.querySelectorAll('.task-tile');
        tiles.forEach(tile => {
            if (status === 'todas') {
                tile.style.display = 'flex';
            } else {
                tile.style.display = tile.classList.contains('status-' + status) ? 'flex' : 'none';
            }
        });
    }

    // CONTAGENS AUTOMÁTICAS
    function atualizarContadores() {
        const total = DADOS_TAREFAS.length;
        const concluidas = DADOS_TAREFAS.filter(t => t.status === 'concluida').length;
        const pendentes = DADOS_TAREFAS.filter(t => t.status === 'pendente').length;

        document.getElementById('count-todas').innerText = total;
        document.getElementById('count-concluida').innerText = concluidas;
        document.getElementById('count-pendente').innerText = pendentes;
    }

    // INICIALIZAÇÃO DA APLICAÇÃO WEB
    window.onload = function() {
        renderizarGrid();
        atualizarContadores();
    };
</script>

</html>
