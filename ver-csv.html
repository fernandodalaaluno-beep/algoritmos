<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Dados | Fernando Dala</title>
<style>
:root {
    --azul-profundo:#071028; --azul-medio:#1A4A8A; --azul-royal:#1565C0; --azul-vivo:#1E88E5; --azul-claro:#64B5F6;
    --branco:#ffffff; --texto-claro:#E8F4FD; --texto-secundario:#90CAF9;
    --glass-fundo:rgba(255,255,255,0.06); --glass-fundo-hov:rgba(255,255,255,0.11);
    --glass-border:rgba(100,181,246,0.20); --glass-border-hov:rgba(100,181,246,0.50); --glass-blur:blur(14px);
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'SF Pro Display',system-ui,-apple-system,sans-serif; }
body {
    background: linear-gradient(160deg, #0D1B3E 0%, #0A2D6E 35%, #0D1F4E 65%, #071028 100%);
    background-attachment: fixed; color: var(--texto-claro); padding: 40px 20px; line-height:1.6; min-height:100vh;
}
.container { max-width:1100px; margin:auto; }
.voltar {
    display:inline-flex; align-items:center; gap:8px; color:var(--azul-claro); text-decoration:none;
    font-weight:700; margin-bottom:24px; font-size:.95rem; background:none; border:none; cursor:pointer;
}
.voltar:hover { color:var(--branco); }
header {
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
    background: var(--glass-fundo); padding:26px 30px; border-radius:20px; border:1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); margin-bottom:24px;
}
h1 { color:var(--branco); font-size:1.3rem; font-weight:700; display:flex; align-items:center; gap:12px; word-break:break-word; }
.badge { color:var(--azul-claro); font-weight:700; font-size:.8rem; text-transform:uppercase; letter-spacing:1px; background:rgba(30,136,229,.15); padding:4px 12px; border-radius:20px; border:1px solid rgba(100,181,246,.3); white-space:nowrap; }
.info-linhas { color:var(--texto-secundario); font-size:.85rem; white-space:nowrap; }
.tabela-wrapper {
    background:#0f1c3d; border-radius:18px; border:1px solid var(--glass-border);
    overflow:auto; box-shadow:0 8px 40px rgba(0,0,0,.5); max-height:75vh;
}
table { border-collapse:collapse; width:100%; font-size:.88rem; white-space:nowrap; }
thead th {
    position:sticky; top:0; background:var(--azul-medio); color:var(--branco); font-weight:700;
    padding:12px 18px; text-align:left; border-bottom:2px solid var(--azul-claro); z-index:1;
}
tbody td { padding:9px 18px; border-bottom:1px solid rgba(100,181,246,.1); color:var(--texto-claro); font-variant-numeric:tabular-nums; }
tbody tr:nth-child(even) { background:rgba(255,255,255,.02); }
tbody tr:hover { background:rgba(100,181,246,.08); }
.mensagem { text-align:center; padding:60px 20px; color:var(--texto-secundario); }
.mensagem.erro { color:#FF8A80; }
footer { text-align:center; margin-top:36px; color:var(--texto-secundario); font-size:.85rem; }
@media (max-width:640px){ header{padding:20px;} h1{font-size:1.05rem;} }
</style>
</head>
<body>
<div class="container">
    <a class="voltar" href="javascript:history.back()">&larr; Voltar</a>
    <header>
        <h1><span aria-hidden="true">📊</span><span id="nome-arquivo">Carregando...</span></h1>
        <div style="display:flex; gap:14px; align-items:center;">
            <span class="info-linhas" id="info-linhas"></span>
            <span class="badge">CSV</span>
        </div>
    </header>
    <div class="tabela-wrapper">
        <table id="tabela-dados"></table>
    </div>
    <footer>Universidade Federal do Pampa &bull; Campus Alegrete &bull; Engenharia &copy; 2026</footer>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var caminho = params.get('arquivo');
var nomeExibicao = caminho ? caminho.split('/').pop() : 'dados.csv';
document.getElementById('nome-arquivo').textContent = nomeExibicao;
document.title = nomeExibicao + ' | Fernando Dala';

function parseCSV(texto) {
    var linhas = texto.replace(/\r\n/g, '\n').split('\n').filter(function(l){ return l.trim() !== ''; });
    return linhas.map(function(linha) { return linha.split(','); });
}

if (caminho) {
    fetch(caminho)
        .then(function(res) {
            if (!res.ok) throw new Error('Arquivo não encontrado (' + res.status + ')');
            return res.text();
        })
        .then(function(texto) {
            var linhas = parseCSV(texto);
            if (linhas.length === 0) throw new Error('Arquivo vazio');
            var cabecalho = linhas[0];
            var corpo = linhas.slice(1);
            document.getElementById('info-linhas').textContent = corpo.length + ' linhas × ' + cabecalho.length + ' colunas';

            var thead = '<thead><tr>' + cabecalho.map(function(c){ return '<th>' + c.trim() + '</th>'; }).join('') + '</tr></thead>';
            var tbody = '<tbody>' + corpo.map(function(linha) {
                return '<tr>' + linha.map(function(v){ return '<td>' + v.trim() + '</td>'; }).join('') + '</tr>';
            }).join('') + '</tbody>';

            document.getElementById('tabela-dados').innerHTML = thead + tbody;
        })
        .catch(function(err) {
            document.querySelector('.tabela-wrapper').innerHTML =
                '<p class="mensagem erro">Não foi possível carregar o arquivo: ' + err.message + '</p>';
        });
} else {
    document.querySelector('.tabela-wrapper').innerHTML =
        '<p class="mensagem erro">Nenhum arquivo especificado.</p>';
}
</script>
</body>
</html>
